apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wrenjobs.wren.scops-hpc.com
  annotations:
    "helm.sh/hook": crd-install
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "wren.labels" . | nindent 4 }}
spec:
  group: wren.scops-hpc.com
  names:
    categories: []
    kind: WrenJob
    plural: wrenjobs
    shortNames: []
    singular: wrenjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .spec.nodes
      name: Nodes
      type: integer
    - jsonPath: .spec.queue
      name: Queue
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for WrenJobSpec via `CustomResource`
        properties:
          spec:
            description: WrenJob is the primary user-facing CRD for submitting multi-node workloads. This is the Wren equivalent of `sbatch`.
            properties:
              backend:
                default: container
                description: 'Execution backend: "container" (default) or "reaper"'
                enum:
                - container
                - reaper
                type: string
              container:
                description: Container backend configuration
                nullable: true
                properties:
                  args:
                    default: []
                    items:
                      type: string
                    type: array
                  command:
                    default: []
                    items:
                      type: string
                    type: array
                  env:
                    default: []
                    description: Environment variables
                    items:
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                  hostNetwork:
                    default: false
                    description: Use host networking (required for Slingshot/RDMA)
                    type: boolean
                  image:
                    type: string
                  resources:
                    nullable: true
                    properties:
                      limits:
                        additionalProperties:
                          type: string
                        default: {}
                        type: object
                      requests:
                        additionalProperties:
                          type: string
                        default: {}
                        type: object
                    type: object
                  volumeMounts:
                    default: []
                    description: Additional volume mounts
                    items:
                      properties:
                        mountPath:
                          type: string
                        name:
                          type: string
                        readOnly:
                          default: false
                          type: boolean
                      required:
                      - mountPath
                      - name
                      type: object
                    type: array
                required:
                - image
                type: object
              dependencies:
                default: []
                description: Job dependencies (Slurm-style)
                items:
                  properties:
                    job:
                      description: Name of the job this depends on
                      type: string
                    type:
                      description: 'Dependency type: afterOk, afterAny, afterNotOk'
                      enum:
                      - afterOk
                      - afterAny
                      - afterNotOk
                      type: string
                  required:
                  - job
                  - type
                  type: object
                type: array
              mpi:
                description: MPI configuration
                nullable: true
                properties:
                  fabricInterface:
                    description: Network interface for MPI traffic (e.g., hsn0)
                    nullable: true
                    type: string
                  implementation:
                    default: openmpi
                    description: 'MPI implementation: cray-mpich, openmpi, intel-mpi'
                    type: string
                  sshAuth:
                    default: true
                    description: Use SSH-based MPI bootstrap (mount shared keys)
                    type: boolean
                type: object
              nodes:
                description: Number of nodes required (gang scheduling unit)
                format: uint32
                minimum: 0.0
                type: integer
              priority:
                default: 50
                description: Job priority (higher = more important)
                format: int32
                type: integer
              queue:
                default: default
                description: Queue to submit this job to
                type: string
              reaper:
                description: Reaper backend configuration (bare-metal execution)
                nullable: true
                properties:
                  environment:
                    additionalProperties:
                      type: string
                    default: {}
                    description: Environment variables
                    type: object
                  script:
                    description: Job script to execute on bare metal
                    type: string
                  workingDir:
                    description: Working directory
                    nullable: true
                    type: string
                required:
                - script
                type: object
              tasksPerNode:
                default: 1
                description: MPI ranks per node
                format: uint32
                minimum: 0.0
                type: integer
              topology:
                description: Topology placement preferences
                nullable: true
                properties:
                  maxHops:
                    description: Maximum allowed network hops between any two nodes in the placement
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  preferSameSwitch:
                    default: false
                    description: Prefer placing all pods on nodes sharing the same network switch
                    type: boolean
                  topologyKey:
                    description: Kubernetes label key for topology grouping
                    nullable: true
                    type: string
                type: object
              walltime:
                description: Maximum wall time (e.g., "4h", "30m", "1d")
                nullable: true
                type: string
            required:
            - nodes
            type: object
          status:
            nullable: true
            properties:
              assignedNodes:
                default: []
                description: Nodes assigned to this job
                items:
                  type: string
                type: array
              completionTime:
                description: Time the job completed
                nullable: true
                type: string
              message:
                description: Human-readable message
                nullable: true
                type: string
              readyWorkers:
                default: 0
                description: Number of ready workers
                format: uint32
                minimum: 0.0
                type: integer
              startTime:
                description: Time the job started running
                nullable: true
                type: string
              state:
                default: Pending
                description: Current state of the job
                enum:
                - Pending
                - Scheduling
                - Running
                - Succeeded
                - Failed
                - Cancelled
                - WalltimeExceeded
                type: string
              totalWorkers:
                default: 0
                description: Total workers expected
                format: uint32
                minimum: 0.0
                type: integer
            type: object
        required:
        - spec
        title: WrenJob
        type: object
    served: true
    storage: true
    subresources:
      status: {}
