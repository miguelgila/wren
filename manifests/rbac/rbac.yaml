apiVersion: v1
kind: ServiceAccount
metadata:
  name: wren-controller
  namespace: wren-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wren-controller
rules:
  # WrenJob CRD access
  - apiGroups: ["wren.giar.dev"]
    resources: ["wrenjobs", "wrenjobs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # WrenQueue CRD access
  - apiGroups: ["wren.giar.dev"]
    resources: ["wrenqueues"]
    verbs: ["get", "list", "watch"]
  # WrenUser CRD access (user identity resolution)
  - apiGroups: ["wren.giar.dev"]
    resources: ["wrenusers"]
    verbs: ["get", "list", "watch"]
  # Pod management for MPI workers/launcher
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Service management for headless worker discovery
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # ConfigMap management for hostfiles and job ID counter
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secret management for SSH keys
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Node access for topology-aware scheduling
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # ReaperPod CRD access (bare-metal execution backend)
  - apiGroups: ["reaper.io"]
    resources: ["reaperpods", "reaperpods/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wren-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wren-controller
subjects:
  - kind: ServiceAccount
    name: wren-controller
    namespace: wren-system
