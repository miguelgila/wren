apiVersion: v1
kind: Namespace
metadata:
  name: wren-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wren-controller
  namespace: wren-system
  labels:
    app.kubernetes.io/name: wren-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wren-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wren-controller
        app.kubernetes.io/component: controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: wren-controller
      containers:
        - name: controller
          image: wren-controller:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "wren_controller=info,kube=warn"
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
