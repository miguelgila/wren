# Cargo audit configuration
# These advisories are from transitive dependencies (kube-rs, prometheus)
# that we cannot directly update. Review periodically.

[advisories]
ignore = [
    "RUSTSEC-2024-0437",  # protobuf via prometheus 0.13 — no newer release available
    "RUSTSEC-2025-0012",  # backoff unmaintained — transitive via kube-runtime
    "RUSTSEC-2024-0384",  # instant unmaintained — transitive via backoff/kube-runtime
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained — transitive via kube-client
]
