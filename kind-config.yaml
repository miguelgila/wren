# kind cluster configuration for Bubo integration tests.
#
# Creates a 4-worker-node cluster with topology labels to test:
#   - Gang scheduling across multiple nodes
#   - Topology-aware placement (switch groups, racks)
#   - Resource availability and allocation
#
# Usage:
#   kind create cluster --name bubo-test --config kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
    labels:
      topology.bubo.io/switch: switch-0
      topology.bubo.io/rack: rack-0
      topology.kubernetes.io/zone: zone-a
  - role: worker
    labels:
      topology.bubo.io/switch: switch-0
      topology.bubo.io/rack: rack-0
      topology.kubernetes.io/zone: zone-a
  - role: worker
    labels:
      topology.bubo.io/switch: switch-1
      topology.bubo.io/rack: rack-1
      topology.kubernetes.io/zone: zone-b
  - role: worker
    labels:
      topology.bubo.io/switch: switch-1
      topology.bubo.io/rack: rack-1
      topology.kubernetes.io/zone: zone-b
