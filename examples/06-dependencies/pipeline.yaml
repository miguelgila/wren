# Job dependency chain: preprocessing -> training -> evaluation.
# Uses Slurm-style afterOk dependencies.
#
# NOTE: Dependencies are defined in the CRD spec but the reconciler
# does not resolve them yet — this example shows the intended API.
---
apiVersion: wren.giar.dev/v1alpha1
kind: WrenJob
metadata:
  name: preprocess
  annotations:
    wren.giar.dev/user: demo-user
spec:
  nodes: 1
  walltime: "10m"
  container:
    image: busybox:latest
    command: ["echo"]
    args: ["Preprocessing complete"]
---
apiVersion: wren.giar.dev/v1alpha1
kind: WrenJob
metadata:
  name: train
  annotations:
    wren.giar.dev/user: demo-user
spec:
  nodes: 2
  walltime: "1h"
  container:
    image: busybox:latest
    command: ["echo"]
    args: ["Training complete"]
  dependencies:
    - type: afterOk
      job: preprocess
---
apiVersion: wren.giar.dev/v1alpha1
kind: WrenJob
metadata:
  name: evaluate
  annotations:
    wren.giar.dev/user: demo-user
spec:
  nodes: 1
  walltime: "15m"
  container:
    image: busybox:latest
    command: ["echo"]
    args: ["Evaluation complete"]
  dependencies:
    - type: afterOk
      job: train
