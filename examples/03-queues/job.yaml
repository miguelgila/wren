# Submit a job to the "batch" queue.
apiVersion: wren.giar.dev/v1alpha1
kind: WrenJob
metadata:
  name: batch-job
  annotations:
    wren.giar.dev/user: demo-user
spec:
  queue: batch
  nodes: 1
  walltime: "30m"
  container:
    image: busybox:latest
    command: ["echo"]
    args: ["Running in the batch queue"]
