# High-priority urgent job — scheduled before lower-priority jobs.
apiVersion: wren.scops-hpc.com/v1alpha1
kind: WrenJob
metadata:
  name: high-priority-job
spec:
  queue: default
  priority: 200
  nodes: 1
  walltime: "5m"
  container:
    image: busybox:latest
    command: ["echo"]
    args: ["High priority job completed"]
