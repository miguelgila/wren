# Low-priority background job.
apiVersion: hpc.cscs.ch/v1alpha1
kind: WrenJob
metadata:
  name: low-priority-job
spec:
  queue: default
  priority: 10
  nodes: 1
  walltime: "15m"
  container:
    image: busybox:latest
    command: ["sh", "-c"]
    args: ["echo 'Low priority job running' && sleep 30"]
