# Multi-node job: 2 workers + 1 launcher.
# Demonstrates gang scheduling — all nodes must be available.
apiVersion: hpc.cscs.ch/v1alpha1
kind: WrenJob
metadata:
  name: multi-node-demo
spec:
  nodes: 2
  tasksPerNode: 1
  walltime: "10m"
  container:
    image: busybox:latest
    command: ["sh", "-c"]
    args: ["echo 'Worker on node:' $(hostname) && sleep 10"]
