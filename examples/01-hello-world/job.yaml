# Simplest possible Wren job: single-node echo.
# This is the "hello world" — verifies the controller is working.
apiVersion: wren.giar.dev/v1alpha1
kind: WrenJob
metadata:
  name: hello-wren
  annotations:
    wren.giar.dev/user: demo-user
spec:
  nodes: 1
  walltime: "5m"
  container:
    image: busybox:latest
    command: ["echo"]
    args: ["Hello from Wren!"]
