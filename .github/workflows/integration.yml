name: Integration

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-musl-
      - name: Build (release, musl)
        run: cargo build --workspace --release --target x86_64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/x86_64-unknown-linux-musl/release/wren-controller
            target/x86_64-unknown-linux-musl/release/wren
          retention-days: 1

  kind-integration:
    name: Kind Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: target/x86_64-unknown-linux-musl/release/
      - name: Make binaries executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/wren-controller target/x86_64-unknown-linux-musl/release/wren
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
      - name: Build Docker image (using pre-built binary)
        run: |
          cp target/x86_64-unknown-linux-musl/release/wren-controller docker/
          docker build -f docker/Dockerfile.controller --target runtime-prebuilt -t wren-controller:latest docker/
          rm docker/wren-controller
      - name: Run integration tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          command: SKIP_BUILD=1 ./scripts/run-integration-tests.sh
      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: /tmp/wren-integration-logs/
          retention-days: 7
