name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (show changes without committing)"
        required: false
        type: boolean
        default: false

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  manual-release:
    name: Manual Version Bump (${{ inputs.bump }})
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(sed -n '/^\[workspace\.package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          sed -i "/^\[workspace\.package\]/,/^\[/s/^version = \".*\"/version = \"${NEW_VERSION}\"/" Cargo.toml
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Bumped version: ${CURRENT} → ${NEW_VERSION}"

      - name: Update lockfile
        run: cargo generate-lockfile

      - name: Generate changelog
        run: git-cliff --config cliff.toml --output CHANGELOG.md

      - name: Show diff (dry run)
        if: inputs.dry_run
        run: |
          echo "## Dry Run — Changes Preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          git diff >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "Would bump: ${{ steps.bump.outputs.current }} → ${{ steps.bump.outputs.version }}"
          git checkout -- .

      - name: Commit, tag, and push
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --follow-tags

      - name: Trigger release workflow
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh workflow run release.yml --field tag="v${{ steps.bump.outputs.version }}"

      - name: Summary
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bump type:** ${{ inputs.bump }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.bump.outputs.current }} → ${{ steps.bump.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run:** ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
